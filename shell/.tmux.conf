# Enable mouse: click panes/windows to focus, scroll, and drag borders to resize
set -g mouse on

# Vi-style navigation in copy mode
set -g mode-keys vi

# Copying (keyboard or mouse) also pushes to the macOS clipboard via pbcopy
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# New panes/windows open in the current pane's directory
bind '"' split-window -v -c "#{pane_current_path}"   # horizontal split (Ctrl-b ")
bind %   split-window -h -c "#{pane_current_path}"   # vertical split   (Ctrl-b %)
bind c   new-window      -c "#{pane_current_path}"   # new window       (Ctrl-b c)

# Quality-of-life defaults
setw -g automatic-rename off  # keep manual window names (set with Ctrl-b ,)
set -g status-position top    # move the status bar to the top
set -g history-limit 50000   # much longer scrollback

# ── Status bar styling (accent blocks) ──────────────────────────────
set -g status-interval 5                     # refresh clock every 5s
set -g status-justify left                   # window list on the left

# Base bar
set -g status-style "bg=colour236,fg=colour250"

# Left: session name in an accent block
set -g status-left-length 30
set -g status-left "#[fg=colour236,bg=colour109,bold] #S #[fg=colour109,bg=colour236] "

# Right: clock + date in an accent block
set -g status-right-length 40
set -g status-right "#[fg=colour109,bg=colour236]#[fg=colour236,bg=colour109,bold] %H:%M %d-%b "

# Inactive windows: dim
setw -g window-status-format " #I #W "
setw -g window-status-style "fg=colour244,bg=colour236"

# Active window: bright block with pointed edges
setw -g window-status-current-format "#[fg=colour236,bg=colour109]#[fg=colour236,bg=colour109,bold] #I #W #[fg=colour109,bg=colour236]"
setw -g window-status-current-style "bold"

# Separator between windows + window with a bell/activity
setw -g window-status-separator ""
setw -g window-status-bell-style "fg=colour236,bg=colour179,bold"

# Pane borders match the theme
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour109"
set -g base-index 1          # number windows from 1 (matches the number keys)
setw -g pane-base-index 1    # number panes from 1
set -g renumber-windows on   # closing a window renumbers the rest to close the gap
set -sg escape-time 10       # snappier key handling, no input lag
